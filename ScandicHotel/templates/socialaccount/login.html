{% extends 'base.html' %}

{% block content %}
<div class="container-fluid min-vh-100">
  <div class="row min-vh-100">
    
    <!-- Left side - image -->
    <div class="col-md-6 p-0">
      <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" 
      alt="Scandic Hotel Lobby and Bar" 
      style="width: 100%; height: 100%; object-fit: cover;">
    </div>

    <!-- Right side - form -->
    <div class="col-md-6 d-flex align-items-center justify-content-center">
      <div class="w-75">
        <h2 class="fw-bold mb-1" style="color: #1e3c5c;">Sign in via Google</h2>
        <p class="text-muted mb-4">You are about to sign in using your Google account.</p>

        <form method="POST" action="{{ signup_url }}">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn w-100 mb-3" style="background-color: #d4af37; color: #1e3c5c; font-weight: 700; border-radius: 40px;">
            Continue
          </button>
        </form>
        </div>
    </div>
    </div>
</div>


{% endblock %}
