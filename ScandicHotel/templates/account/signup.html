{% extends 'base.html' %}

{% block content %}
<div class="container-fluid min-vh-100">
  <div class="row min-vh-100">
    
    <!-- Left side - image -->
    <div class="col-md-6 p-0">
      <img src="https://images.unsplash.com/photo-1566073771259-6a8506099945?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" 
           alt="Scandic Hotel" 
           style="width: 100%; height: 100%; object-fit: cover;">
    </div>

    <!-- Right side - form -->
    <div class="col-md-6 d-flex align-items-center justify-content-center">
      <div class="w-75">
        <h2 class="fw-bold mb-1" style="color: #1e3c5c;">Create Account</h2>
        <p class="text-muted mb-4">Join Scandic Hotel today</p>

        <form method="POST" action="{% url 'account_signup' %}">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn w-100 mb-3" style="background-color: #d4af37; color: #1e3c5c; font-weight: 700; border-radius: 40px;">
            Sign Up
          </button>
        </form>

        <div class="text-center mb-3">or</div>

        <a href="/accounts/google/login/?process=login" class="btn w-100" style="border: 1.5px solid #d4af37; color: #1e3c5c; border-radius: 40px; font-weight: 500;">
          <i class="fab fa-google me-2"></i> Sign in with Google
        </a>

        <p class="text-center mt-4 text-muted">Already have an account? 
          <a href="{% url 'account_login' %}" style="color: #d4af37;">Sign In</a>
        </p>
      </div>
    </div>

  </div>
</div>
{% endblock %}
