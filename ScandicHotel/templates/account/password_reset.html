{% extends "base.html" %}

{% block content %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center p-5 rounded-4" style="background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.08); max-width: 480px; width: 100%;">
        
        <div style="font-size: 3.5rem;">🔑</div>
        <h3 class="fw-bold mt-3" style="color: #1e3c5c;">Reset Password</h3>
        <p class="text-muted mb-4">Enter your email address and we'll send you a link to reset your password.</p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
            <label class="form-label" style="color: #1e3c5c;">Email Address</label>
            <input type="email" name="email" class="form-control rounded-pill" placeholder="Your email address" style="border: 1.5px solid #d4af37;">
                </div>
            <button type="submit" class="btn w-100 py-2" 
                    style="background-color: #d4af37; color: #1e3c5c; font-weight: 700; border-radius: 40px;">
                Send Reset Link
            </button>
        </form>

        <p class="text-center mt-4 text-muted">
            Remember your password? 
            <a href="{% url 'account_login' %}" style="color: #d4af37;">Sign In</a>
        </p>

    </div>
</div>
{% endblock %}
