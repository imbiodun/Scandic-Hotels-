{% extends "base.html" %}

{% block content %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center p-5 rounded-4" style="background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.08); max-width: 480px; width: 100%;">
        
        <div style="font-size: 3.5rem;">👋</div>
        
        <h3 class="fw-bold mt-3" style="color: #1e3c5c;">Leaving so soon?</h3>
        <p class="text-muted mb-4">You will be logged out of your Scandic account.</p>

        <form method="post">
            {% csrf_token %}
            <div class="d-flex gap-3 justify-content-center">
                <button type="submit" class="btn px-4 py-2" 
                        style="background-color: #d4af37; color: #1e3c5c; font-weight: 700; border-radius: 40px;">
                    Yes, Logout
                </button>
                <a href="{% url 'profile' %}" class="btn px-4 py-2" 
                   style="border: 1.5px solid #1e3c5c; color: #1e3c5c; border-radius: 40px; font-weight: 500;">
                    Cancel
                </a>
            </div>
        </form>

    </div>
</div>
{% endblock %}
