{% extends "base.html" %}

{% block content %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="text-center p-5 rounded-4" style="background: white; box-shadow: 0 20px 40px rgba(0,0,0,0.08); max-width: 480px; width: 100%;">
        <div style="font-size: 3.5rem;">🔒</div>
        <h3 class="fw-bold mt-3" style="color: #1e3c5c;">Set New Password</h3>
        <p class="text-muted mb-4">Enter your new password below.</p>

        {% if token_fail %}
            <div class="alert" style="background-color: #f8d7da; color: #842029; border-radius: 10px;">
                This reset link is invalid or has expired. 
                <a href="{% url 'account_reset_password' %}" style="color: #d4af37;">Request a new one</a>
            </div>
        {% else %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3 text-start">
                    <label class="form-label" style="color: #1e3c5c;">New Password</label>
                    <input type="password" name="password1" class="form-control rounded-pill" 
                           placeholder="New password" style="border: 1.5px solid #d4af37;">
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label" style="color: #1e3c5c;">Confirm New Password</label>
                    <input type="password" name="password2" class="form-control rounded-pill" 
                           placeholder="Confirm new password" style="border: 1.5px solid #d4af37;">
                </div>
                <button type="submit" class="btn w-100 py-2" 
                        style="background-color: #d4af37; color: #1e3c5c; font-weight: 700; border-radius: 40px;">
                    Change Password
                </button>
            </form>
        {% endif %}
    </div>
</div>
{% endblock %}
